spring:
  application:
    name: mobile-management-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mmp}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
  info:
    title: Digital Citizen - Client Service API
    description: REST API documentation for client management
    version: 1.0.0

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}

services:
  client-url: ${CLIENT_SERVICE_URL:http://localhost:8080}
  device-url: ${DEVICE_SERVICE_URL:http://localhost:8080}
  line-url: ${LINE_SERVICE_URL:http://localhost:8080}
  user-url: ${USER_SERVICE_URL:http://localhost:8080}



